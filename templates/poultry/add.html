{% extends "base.html" %}

{% block title %}Add Poultry Coop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0">
                    <i class="fas fa-plus me-2"></i>
                    Add New Poultry Coop
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="coop_id" class="form-label">Coop ID *</label>
                            <input type="text" class="form-control" id="coop_id" name="coop_id" required>
                            <div class="form-text">Unique identifier for the coop (e.g., CP001)</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="breed" class="form-label">Breed *</label>
                            <select class="form-control" id="breed" name="breed" required>
                                <option value="">Select Breed</option>
                                <option value="Rhode Island Red">Rhode Island Red</option>
                                <option value="Leghorn">Leghorn</option>
                                <option value="Sussex">Sussex</option>
                                <option value="Brahma">Brahma</option>
                                <option value="Orpington">Orpington</option>
                                <option value="Plymouth Rock">Plymouth Rock</option>
                                <option value="Australorp">Australorp</option>
                                <option value="Local">Local Breed</option>
                                <option value="Crossbred">Crossbred</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="count" class="form-label">Number of Birds *</label>
                            <input type="number" class="form-control" id="count" name="count" min="1" max="10000" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="egg_production_daily" class="form-label">Daily Egg Production</label>
                            <input type="number" class="form-control" id="egg_production_daily" name="egg_production_daily" min="0" max="10000">
                            <div class="form-text">Expected or current daily egg count</div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="feed_consumption" class="form-label">Daily Feed Consumption (kg)</label>
                            <input type="number" class="form-control" id="feed_consumption" name="feed_consumption" min="0" step="0.1">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="mortality_rate" class="form-label">Mortality Rate (%)</label>
                            <input type="number" class="form-control" id="mortality_rate" name="mortality_rate" min="0" max="100" step="0.1">
                            <div class="form-text">Current mortality percentage</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="coop_type" class="form-label">Coop Type</label>
                        <select class="form-control" id="coop_type" name="coop_type">
                            <option value="Layer">Layer (Egg Production)</option>
                            <option value="Broiler">Broiler (Meat Production)</option>
                            <option value="Breeder">Breeder</option>
                            <option value="Mixed">Mixed Purpose</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="housing_system" class="form-label">Housing System</label>
                        <select class="form-control" id="housing_system" name="housing_system">
                            <option value="Free Range">Free Range</option>
                            <option value="Cage System">Cage System</option>
                            <option value="Deep Litter">Deep Litter</option>
                            <option value="Semi-Intensive">Semi-Intensive</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Additional Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Any additional information about the coop setup, special requirements, etc."></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('poultry.index') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back to List
                        </a>
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save"></i> Add Coop
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form');
    const countInput = document.getElementById('count');
    const eggProductionInput = document.getElementById('egg_production_daily');
    const coopTypeInput = document.getElementById('coop_type');
    
    // Auto-calculate expected egg production
    function calculateExpectedProduction() {
        const birdCount = parseInt(countInput.value) || 0;
        const coopType = coopTypeInput.value;
        
        if (birdCount > 0 && coopType === 'Layer') {
            // Estimate 85% production rate for layers
            const expectedEggs = Math.round(birdCount * 0.85);
            if (!eggProductionInput.value) {
                eggProductionInput.value = expectedEggs;
            }
        }
    }
    
    countInput.addEventListener('input', calculateExpectedProduction);
    coopTypeInput.addEventListener('change', calculateExpectedProduction);
    
    // Form validation
    form.addEventListener('submit', function(e) {
        const coopId = document.getElementById('coop_id').value;
        const breed = document.getElementById('breed').value;
        const count = parseInt(document.getElementById('count').value);
        
        if (!coopId || !breed || !count) {
            e.preventDefault();
            alert('Please fill in all required fields.');
            return;
        }
        
        if (count > 5000) {
            if (!confirm('Large coop detected. Are you sure about the bird count?')) {
                e.preventDefault();
                return;
            }
        }
    });
});
</script>
{% endblock %}
